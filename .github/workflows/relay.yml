name: relay
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch ForexFactory calendar
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          for wk in thisweek nextweek; do
            curl -fsS -A "$UA" "https://nfs.faireconomy.media/ff_calendar_${wk}.json" -o "ff_calendar_${wk}.json"
            python3 -c "import json;d=json.load(open('ff_calendar_${wk}.json'));assert isinstance(d,list) and d, 'empty feed'"
          done
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_updated.txt
      - name: Commit if changed
        run: |
          git config user.name "relay-bot"
          git config user.email "relay@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "relay: $(cat last_updated.txt)"
          git push
