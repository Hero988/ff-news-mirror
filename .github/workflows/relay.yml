name: relay
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch ForexFactory calendar
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0 Safari/537.36"
          fetch_week() {
            wk="$1"
            for host in nfs.faireconomy.media cdn-nfs.faireconomy.media; do
              if curl -fsS --retry 2 --retry-delay 3 \
                   -A "$UA" \
                   -H "Accept: application/json, text/plain, */*" \
                   -H "Accept-Language: en-GB,en;q=0.9" \
                   -H "Referer: https://www.forexfactory.com/" \
                   -H "Origin: https://www.forexfactory.com" \
                   "https://${host}/ff_calendar_${wk}.json" -o "ff_calendar_${wk}.json"; then
                echo "OK ${wk} via ${host}"
                return 0
              fi
              echo "refused ${wk} via ${host}"
            done
            return 1
          }
          fetch_week thisweek
          python3 -c "import json;d=json.load(open('ff_calendar_thisweek.json'));assert isinstance(d,list) and d, 'empty feed'"
          # nextweek is best-effort: the running week alone satisfies the bot's compliance
          # lookahead (it never trades or holds beyond the current FF week).
          for attempt in 1 2 3; do
            sleep 15
            if fetch_week nextweek && python3 -c "import json;d=json.load(open('ff_calendar_nextweek.json'));assert isinstance(d,list) and d" 2>/dev/null; then break; fi
          done
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_updated.txt
      - name: Commit if changed
        run: |
          git config user.name "relay-bot"
          git config user.email "relay@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "relay: $(cat last_updated.txt)"
          git push


